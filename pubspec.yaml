name: convo
description: Convo - Chat App by TheKami
publish_to: 'none'
version: 1.0.0.68+6

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.2.0
  firebase_messaging: ^15.1.0
  google_sign_in: ^6.2.1
  shared_preferences: ^2.2.3
  url_launcher: ^6.2.5
  flutter_contacts: ^1.1.9+1
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.0.0
  flutter_svg: ^2.0.10
  http: ^1.2.1
  package_info_plus: ^8.0.0
  open_file_plus: ^3.4.1
  path_provider: ^2.1.4

dev_dependencies:
  flutter_launcher_icons: ^0.14.1

flutter_icons:
  android: true
  ios: false
  image_path: "assets/black_logo.png"
  adaptive_icon_background: "#111111"
  adaptive_icon_foreground: "assets/white_logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/black_logo.png
    - assets/white_logo.png
    - assets/black_logo.svg
    - assets/white_logo.svg
