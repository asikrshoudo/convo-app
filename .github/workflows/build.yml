name: Build & Release APK

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create Flutter scaffold
        run: flutter create --org com.thekami --project-name convo /tmp/convo

      - name: Write local.properties
        run: |
          FLUTTER_SDK=$(dirname $(dirname $(which flutter)))
          printf "flutter.sdk=%s\nsdk.dir=%s\n" "$FLUTTER_SDK" "$ANDROID_SDK_ROOT" > /tmp/convo/android/local.properties
          echo "=== local.properties ==="
          cat /tmp/convo/android/local.properties

      - name: Copy source files
        run: |
          cp $GITHUB_WORKSPACE/lib/main.dart /tmp/convo/lib/main.dart
          cp $GITHUB_WORKSPACE/pubspec.yaml /tmp/convo/pubspec.yaml
          cp $GITHUB_WORKSPACE/android/app/build.gradle /tmp/convo/android/app/build.gradle
          cp $GITHUB_WORKSPACE/android/gradle/wrapper/gradle-wrapper.properties /tmp/convo/android/gradle/wrapper/gradle-wrapper.properties
          cp $GITHUB_WORKSPACE/android/app/src/main/AndroidManifest.xml /tmp/convo/android/app/src/main/AndroidManifest.xml
          touch /tmp/convo/android/app/proguard-rules.pro

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES" ]; then
            echo "$GOOGLE_SERVICES" > /tmp/convo/android/app/google-services.json
          else
            cp $GITHUB_WORKSPACE/android/app/google-services.json /tmp/convo/android/app/google-services.json
          fi

      - name: Build APK
        working-directory: /tmp/convo
        run: |
          flutter pub get
          flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0.${{ github.run_number }}
          name: Convo v1.0.0.${{ github.run_number }}
          body: "Convo Release — Build #${{ github.run_number }}"
          files: /tmp/convo/build/app/outputs/flutter-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}