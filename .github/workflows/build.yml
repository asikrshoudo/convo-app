name: Build & Release APK

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Create Flutter project
        run: flutter create --org com.thekami --project-name convo /tmp/convo

      - name: Copy source files
        run: |
          cp $GITHUB_WORKSPACE/lib/main.dart /tmp/convo/lib/main.dart
          cp $GITHUB_WORKSPACE/pubspec.yaml /tmp/convo/pubspec.yaml

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES" > /tmp/convo/android/app/google-services.json

      - name: Setup Firebase in Gradle
        run: |
          python3 - << 'PYEOF'
          import re

          # project build.gradle
          proj = open('/tmp/convo/android/build.gradle').read()
          proj = proj.replace(
            'dependencies {',
            'dependencies {\n        classpath "com.google.gms:google-services:4.4.0"',
            1
          )
          open('/tmp/convo/android/build.gradle', 'w').write(proj)

          # app build.gradle
          app = open('/tmp/convo/android/app/build.gradle').read()
          app = 'apply plugin: "com.google.gms.google-services"\n' + app
          app = app.replace('minSdk = flutter.minSdkVersion', 'minSdk = 24')
          open('/tmp/convo/android/app/build.gradle', 'w').write(app)
          PYEOF

      - name: Add Internet permission
        run: |
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.INTERNET"/>\n</manifest>|' /tmp/convo/android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: |
          cd /tmp/convo
          flutter pub get
          flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: Rename APK
        run: find /tmp/convo/build/app/outputs/flutter-apk/ -name "*.apk" -exec mv {} /tmp/convo/build/app/outputs/flutter-apk/convo.apk \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0.4
          name: Convo v1.0.0.4
          body: "Convo v1.0.0.4 - Firebase live, Create Account, User Search"
          files: /tmp/convo/build/app/outputs/flutter-apk/convo.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
