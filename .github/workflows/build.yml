name: Build & Release APK

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Create Flutter project
        run: |
          flutter create --org com.thekami --project-name convo /tmp/convo
          cp $GITHUB_WORKSPACE/lib/main.dart /tmp/convo/lib/main.dart
          cp $GITHUB_WORKSPACE/pubspec.yaml /tmp/convo/pubspec.yaml

      - name: Add permissions
        run: |
          sed -i 's/<\/manifest>/    <uses-permission android:name="android.permission.INTERNET"\/>\n<\/manifest>/' /tmp/convo/android/app/src/main/AndroidManifest.xml

      - name: Set min SDK 24
        run: |
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 24/' /tmp/convo/android/app/build.gradle

      - name: Build APK
        run: |
          cd /tmp/convo
          flutter pub get
          flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: Rename APK
        run: |
          mv /tmp/convo/build/app/outputs/flutter-apk/app-release-arm64-v8a.apk /tmp/convo/build/app/outputs/flutter-apk/convo.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0.3
          name: Convo v1.0.0.3
          body: |
            ## Convo v1.0.0.3
            - Better login UI
            - Dynamic search bar
            - Profile with cover + stats
            - Verification badge option
            - Settings improved
            - APK size optimized (~18MB)
            - Powered by TheKami
          files: /tmp/convo/build/app/outputs/flutter-apk/convo.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
