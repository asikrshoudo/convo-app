name: Build & Release APK

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Create Flutter project
        run: |
          flutter create --org com.thekami --project-name convo /tmp/convo
          cp $GITHUB_WORKSPACE/lib/main.dart /tmp/convo/lib/main.dart
          cp $GITHUB_WORKSPACE/pubspec.yaml /tmp/convo/pubspec.yaml
          mkdir -p /tmp/convo/android/app
          cp $GITHUB_WORKSPACE/android/app/google-services.json /tmp/convo/android/app/google-services.json

      - name: Configure Android
        run: |
          sed -i 's/<\/manifest>/    <uses-permission android:name="android.permission.INTERNET"\/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"\/>\n<\/manifest>/' /tmp/convo/android/app/src/main/AndroidManifest.xml
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 24/' /tmp/convo/android/app/build.gradle

      - name: Add Google Services plugin
        run: |
          sed -i '/^plugins {/a\    id("com.google.gms.google-services") version "4.4.0" apply false' /tmp/convo/android/build.gradle
          sed -i '/^plugins {/a\    id("com.google.gms.google-services")' /tmp/convo/android/app/build.gradle

      - name: Build APK
        run: |
          cd /tmp/convo
          flutter pub get
          flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: Rename APK
        run: |
          find /tmp/convo/build/app/outputs/flutter-apk/ -name "*.apk" -exec mv {} /tmp/convo/build/app/outputs/flutter-apk/convo.apk \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0.4
          name: Convo v1.0.0.4
          body: |
            ## Convo v1.0.0.4
            - Firebase Auth live (Email/Password)
            - Create Account screen
            - Real user search (Firestore)
            - Account suggestion toggle
            - Profile: bio, city, education, social links
            - Sign Out button
            - Powered by TheKami
          files: /tmp/convo/build/app/outputs/flutter-apk/convo.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
