name: Build APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Create Flutter project
        run: |
          flutter create --org com.kamichat --project-name kami_chat /tmp/kami_chat
          cp $GITHUB_WORKSPACE/lib/main.dart /tmp/kami_chat/lib/main.dart

      - name: Build APK
        run: |
          cd /tmp/kami_chat
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kami-chat-apk
          path: /tmp/kami_chat/build/app/outputs/flutter-apk/app-release.apk
