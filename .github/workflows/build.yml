name: Build & Release APK

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Write local.properties
        run: |
          FLUTTER_SDK=$(dirname $(dirname $(which flutter)))
          printf "flutter.sdk=%s\nsdk.dir=%s\n" "$FLUTTER_SDK" "$ANDROID_SDK_ROOT" > android/local.properties

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES" ]; then
            echo "$GOOGLE_SERVICES" > android/app/google-services.json
          fi

      - name: Create proguard-rules.pro
        run: touch android/app/proguard-rules.pro

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0.${{ github.run_number }}
          name: Convo v1.0.0.${{ github.run_number }}
          body: "Convo Release — Build #${{ github.run_number }}"
          files: build/app/outputs/flutter-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
