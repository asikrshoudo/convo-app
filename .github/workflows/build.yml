name: Build & Release APK

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Create Flutter project
        run: flutter create --org com.thekami --project-name convo /tmp/convo

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > /tmp/convo/android/local.properties

      - name: Copy all source files
        run: |
          cp $GITHUB_WORKSPACE/lib/main.dart /tmp/convo/lib/main.dart
          cp $GITHUB_WORKSPACE/pubspec.yaml /tmp/convo/pubspec.yaml
          cp $GITHUB_WORKSPACE/android/settings.gradle /tmp/convo/android/settings.gradle
          cp $GITHUB_WORKSPACE/android/build.gradle /tmp/convo/android/build.gradle
          cp $GITHUB_WORKSPACE/android/app/build.gradle /tmp/convo/android/app/build.gradle
          cp $GITHUB_WORKSPACE/android/app/src/main/AndroidManifest.xml /tmp/convo/android/app/src/main/AndroidManifest.xml
          cp $GITHUB_WORKSPACE/android/gradle/wrapper/gradle-wrapper.properties /tmp/convo/android/gradle/wrapper/gradle-wrapper.properties

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES" > /tmp/convo/android/app/google-services.json

      - name: Build APK
        run: |
          cd /tmp/convo
          flutter pub get
          flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: Rename APK
        run: find /tmp/convo/build/app/outputs/flutter-apk/ -name "*.apk" -exec mv {} /tmp/convo/build/app/outputs/flutter-apk/convo.apk \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0.4
          name: Convo v1.0.0.4
          body: "Convo v1.0.0.4 - Firebase live"
          files: /tmp/convo/build/app/outputs/flutter-apk/convo.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}